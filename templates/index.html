<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataWash</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Verdana, sans-serif;
            background: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { text-align: center; padding: 40px; }
        h1 { font-size: 3rem; color: #ffffff; margin-bottom: 10px; }
        p { color: #aaaaaa; font-size: 1.1rem; margin-bottom: 30px; }
        .upload-box {
            border: 2px solid #ffffff;
            border-radius: 12px;
            padding: 40px;
            cursor: pointer;
        }
        .upload-box p { color: #ffffff; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DataWasH</h1>

        <div class="upload-box">

            <p style="color:#555; font-size:0.85rem; margin-top:8px;">
                (Upload functionality coming next!)
            </p>
        </div>
    </div>

</html>
