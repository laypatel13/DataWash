<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataWash</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Verdana, sans-serif;
            background: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { text-align: center; padding: 40px; }
        h1 { font-size: 3rem; color: #ffffff; margin-bottom: 10px; }
        p { color: #aaaaaa; font-size: 1.1rem; margin-bottom: 30px; }
        .upload-box {
            border: 2px solid #ffffff;
            border-radius: 12px;
            padding: 40px;
            cursor: pointer;
        }
        .upload-box p { color: #ffffff; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DataWasH</h1>
        <p>Drop Your CSV To Get It Cleaned And Analysis Too.</p>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="upload-box">
                <p>📂 Upload your CSV file</p>
                <input type="file" name="file" accept=".csv" style="margin: 15px 0; font-family:monospace; color: #ffffff;">
                <br>
                <button type="submit" style="
                    background: #aaaaaa;
                    color: white;
                    border: none;
                    padding: 12px 30px;
                    border-radius: 8px;
                    font-size: 1rem;
                    cursor: pointer;
                    margin-top: 10px;">
                    Upload & Analyze
                </button>
            </div>
        </form>
    </div>
</body>
</html>
