<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataWash</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { text-align: center; padding: 40px; }
        h1 { font-size: 3rem; color: #ffffff; margin-bottom: 10px; }
        p { color: #aaaaaa; font-size: 1.1rem; margin-bottom: 30px; }
        .upload-box {
            border: 2px solid #ffffff;
            border-radius: 12px;
            padding: 40px;
            cursor: pointer;
        }
        .upload-box p { color: #ffffff; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DataWasH</h1>
        <p>Drop Your CSV To Get It Cleaned And Analysis Too.</p>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="upload-box">
                <p>📂 Upload your CSV file</p>
                <label for="fileInput" style="
                    display: inline-block;
                    border: 2px dashed #ffffff;
                    border-radius: 10px;
                    padding: 20px 40px;
                    cursor: pointer;
                    color: #aaaaaa;
                    font-size: 0.95rem;
                    margin-bottom: 15px;
                    transition: 0.3s;">
                    📂 <span id="fileLabel">Click to choose a CSV file</span>
                </label>
                <input type="file" id="fileInput" name="file" accept=".csv" style="display:none;">
                <br>
                <button type="submit" style="
                    background: #aaaaaa;
                    color: white;
                    border: none;
                    padding: 12px 30px;
                    border-radius: 8px;
                    font-size: 1rem;
                    cursor: pointer;
                    font-family:'Space Grotesk';
                    margin-top: 10px;">
                    Upload & Analyze
                </button>
            </div>
        </form>
    </div>
    <script>
        document.getElementById("fileInput").addEventListener("change", function() {
            const name = this.files[0] ? this.files[0].name : "Click to choose a CSV file";
            document.getElementById("fileLabel").textContent = name;
        });
    </script>
</body>
</html>
